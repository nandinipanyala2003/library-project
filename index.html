<!DOCTYPE html>
<html>
<head>
    <title>Library Management System</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            text-align: center;
            margin: 0;
        }

        .container {
            margin-top: 40px;
        }

        .box {
            background: white;
            color: black;
            padding: 20px;
            margin: 20px auto;
            width: 350px;
            border-radius: 10px;
        }

        input, button {
            padding: 10px;
            margin: 5px;
            width: 80%;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #ff7b00;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #ff5500;
        }

        .hidden {
            display: none;
        }

        .book {
            background: #ffffff;
            color: black;
            margin: 10px auto;
            padding: 15px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .available {
            color: green;
            font-weight: bold;
        }

        .issued {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📚 Library Management System</h1>
    <p>Web Demo Version</p>

    <!-- LOGIN -->
    <div class="box" id="loginBox">
        <h3>🔐 Login</h3>
        <input id="loginUser" placeholder="Username"><br>
        <input id="loginPass" type="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <p>New user? <a href="#" onclick="showRegister()">Register</a></p>
    </div>

    <!-- REGISTER -->
    <div class="box hidden" id="registerBox">
        <h3>➕ Register</h3>
        <input id="regUser" placeholder="Username"><br>
        <input id="regPass" type="password" placeholder="Password"><br>
        <button onclick="register()">Register</button>
        <p>Already user? <a href="#" onclick="showLogin()">Login</a></p>
    </div>

    <!-- DASHBOARD -->
    <div class="hidden" id="dashboard">
        <h2>👋 Welcome <span id="username"></span></h2>

        <button onclick="showBooks()">📚 View Books</button>
        <button onclick="showSearch()">🔍 Search</button>
        <button onclick="showAdd()">➕ Add Book</button>
        <button onclick="logout()">🚪 Logout</button>

        <!-- BOOK LIST -->
        <div id="booksSection" class="hidden">
            <h3>📚 Books</h3>
            <div id="bookList"></div>
        </div>

        <!-- SEARCH -->
        <div id="searchSection" class="hidden">
            <h3>🔍 Search Books</h3>
            <input id="searchInput" placeholder="Search...">
            <button onclick="search()">Search</button>
            <div id="searchResult"></div>
        </div>

        <!-- ADD BOOK -->
        <div id="addSection" class="hidden">
            <h3>➕ Add Book</h3>
            <input id="bookTitle" placeholder="Title"><br>
            <input id="bookAuthor" placeholder="Author"><br>
            <button onclick="addBook()">Add</button>
        </div>
    </div>

</div>

<script>

let users = [];
let books = [
    {title:"Python Crash Course", author:"Eric Matthes", available:true},
    {title:"Clean Code", author:"Robert Martin", available:true},
    {title:"Head First Java", author:"Kathy Sierra", available:true}
];

let currentUser = "";

function showRegister(){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("registerBox").classList.remove("hidden");
}

function showLogin(){
    document.getElementById("registerBox").classList.add("hidden");
    document.getElementById("loginBox").classList.remove("hidden");
}

function register(){
    let u = document.getElementById("regUser").value;
    let p = document.getElementById("regPass").value;

    users.push({user:u, pass:p});
    alert("Registered Successfully ✅");
    showLogin();
}

function login(){
    let u = document.getElementById("loginUser").value;
    let p = document.getElementById("loginPass").value;

    let found = users.find(x => x.user === u && x.pass === p);

    if(found){
        currentUser = u;
        document.getElementById("username").innerText = u;
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
    } else {
        alert("Wrong credentials ❌");
    }
}

function logout(){
    location.reload();
}

function showBooks(){
    hideAll();
    let list = document.getElementById("bookList");
    list.innerHTML = "";

    books.forEach((b,i)=>{
        list.innerHTML += `
        <div class="book">
            <b>${b.title}</b><br>
            ${b.author}<br>
            <span class="${b.available ? 'available':'issued'}">
                ${b.available ? "Available" : "Issued"}
            </span><br><br>
            <button onclick="issueBook(${i})">Issue</button>
        </div>`;
    });

    document.getElementById("booksSection").classList.remove("hidden");
}

function issueBook(i){
    if(books[i].available){
        books[i].available = false;
        alert("Book Issued ✅");
        showBooks();
    } else {
        alert("Already Issued ❌");
    }
}

function showSearch(){
    hideAll();
    document.getElementById("searchSection").classList.remove("hidden");
}

function search(){
    let val = document.getElementById("searchInput").value.toLowerCase();
    let res = books.filter(b => b.title.toLowerCase().includes(val));

    let output = document.getElementById("searchResult");
    output.innerHTML = "";

    res.forEach(b=>{
        output.innerHTML += `<div class="book">${b.title} - ${b.author}</div>`;
    });
}

function showAdd(){
    hideAll();
    document.getElementById("addSection").classList.remove("hidden");
}

function addBook(){
    let t = document.getElementById("bookTitle").value;
    let a = document.getElementById("bookAuthor").value;

    books.push({title:t, author:a, available:true});
    alert("Book Added ✅");
}

function hideAll(){
    document.getElementById("booksSection").classList.add("hidden");
    document.getElementById("searchSection").classList.add("hidden");
    document.getElementById("addSection").classList.add("hidden");
}

</script>

</body>
</html>
